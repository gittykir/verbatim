<html lang="en">

<meta charset="UTF-8">
<title>Verbatim Standard — Independent Translator Verification</title>

<style>
:root{
  --ink:#1c2430;
  --paper:#eeefe6;
  --paper-raised:#f7f7f1;
  --gold:#a9843c;
  --teal:#2f6b67;
  --brick:#a6432f;
  --line:#d8d6c8;
  --muted:#6b6f66;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;}
h1,h2,h3,.display{font-family:'Source Serif 4',serif;font-weight:600;letter-spacing:-0.005em;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--gold);color:var(--paper);}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:50;flex-wrap:wrap;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:30px;height:30px;flex:none;}
.brand-name{font-family:'Source Serif 4',serif;font-weight:600;font-size:19px;}
.brand-tag{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:-2px;}
nav{display:flex;gap:4px;flex-wrap:wrap;}
nav button{background:none;border:1px solid transparent;padding:8px 14px;border-radius:3px;font-size:14px;color:var(--ink);}
nav button.active{border-color:var(--ink);background:var(--ink);color:var(--paper);}
nav button:not(.active):hover{border-color:var(--line);background:var(--paper-raised);}

main{max-width:980px;margin:0 auto;padding:40px 28px 90px;}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;}
.hero h1{font-size:clamp(30px,4vw,46px);margin:0 0 14px;max-width:16ch;}
.hero p.lead{font-size:17px;max-width:56ch;color:#333;}
.card{background:var(--paper-raised);border:1px solid var(--line);border-radius:6px;padding:26px;margin-bottom:20px;}
.card h3{margin-top:0;font-size:18px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:720px){.grid2{grid-template-columns:1fr;}main{padding:28px 18px 70px;}.topbar{padding:14px 18px;}}

.btn{display:inline-block;padding:11px 22px;border-radius:3px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);font-size:14px;font-weight:600;letter-spacing:.02em;}
.btn:hover{background:#333c4a;}
.btn.secondary{background:none;color:var(--ink);}
.btn.secondary:hover{background:var(--paper-raised);}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#1c1408;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

label{display:block;font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:14px 0 6px;}
input[type=text],input[type=tel],input[type=password],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:3px;background:#fff;font-family:inherit;font-size:14.5px;color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;}
.filefield{border:1px dashed var(--line);border-radius:4px;padding:14px;background:#fff;font-size:13.5px;}
.hint{font-size:12.5px;color:var(--muted);margin-top:4px;}
.req{color:var(--brick);}

.notice{border-left:3px solid var(--gold);background:#fbf6ea;padding:14px 16px;font-size:13.8px;border-radius:0 4px 4px 0;margin:16px 0;}
.notice.teal{border-color:var(--teal);background:#eef5f4;}
.notice.brick{border-color:var(--brick);background:#faeeeb;}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;}
.badge.pending{background:#efe6ce;color:#6b5417;}
.badge.submitted{background:#dbe8e6;color:var(--teal);}
.badge.scored{background:#dde3d3;color:#3f5a2a;}
.badge.verified{background:#dde3d3;color:#3f5a2a;}
.badge.under_review{background:#e4e0f0;color:#4d3f80;}
.badge.needs_resubmission{background:#f4e2c8;color:#8a5a10;}
.badge.rejected{background:#f3dbd6;color:var(--brick);}

.tabbar{display:flex;gap:6px;margin:18px 0 20px;border-bottom:1px solid var(--line);}
.tabbar button{background:none;border:none;padding:9px 4px;margin-right:20px;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;}
.tabbar button.active{color:var(--ink);font-weight:600;border-color:var(--gold);}
.tabbar button:hover{color:var(--ink);}

.checklist-group{margin-bottom:14px;}
.checklist-group h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px;}
.check-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:14px;}
.check-row input{margin-top:3px;width:auto;}
.review-history{border-left:2px solid var(--line);padding-left:14px;margin-top:6px;}
.review-entry{margin-bottom:10px;font-size:13px;}
.review-entry .who{font-weight:600;}
.linklike{background:none;border:none;color:var(--teal);text-decoration:underline;font-size:13px;padding:0;}

#toastHost{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:5px;font-size:13.5px;box-shadow:0 4px 14px rgba(0,0,0,.18);max-width:420px;text-align:center;animation:toastIn .18s ease-out;}
.toast.error{background:var(--brick);}
.toast.success{background:var(--teal);}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.modal-overlay{position:fixed;inset:0;background:rgba(28,36,48,.55);display:flex;align-items:center;justify-content:center;z-index:210;}
.modal-box{background:#fff;border-radius:6px;padding:24px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.25);}
.modal-box p{font-size:14.5px;margin:0 0 18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;}

.pentagon-wrap{display:flex;justify-content:center;margin:18px 0;}
.pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);padding:6px 12px 6px 10px;border-radius:20px;font-size:13px;margin:4px 6px 4px 0;}
.pill button{background:none;border:none;color:var(--brick);font-size:15px;line-height:1;padding:0;}

.steps{display:flex;gap:0;margin-bottom:28px;}
.step{flex:1;text-align:center;padding-bottom:10px;border-bottom:3px solid var(--line);font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.step.active{border-color:var(--ink);color:var(--ink);font-weight:600;}
.step.done{border-color:var(--teal);color:var(--teal);}

.passage-box{background:#fff;border:1px solid var(--line);border-radius:4px;padding:20px;font-size:15.5px;line-height:1.7;-webkit-user-select:none;user-select:none;position:relative;}
.passage-box::after{content:"Source text · selection disabled";position:absolute;bottom:6px;right:10px;font-size:10.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
textarea.answer{min-height:220px;resize:vertical;font-size:15px;line-height:1.6;}
.meta-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-top:6px;flex-wrap:wrap;gap:6px;}
.paste-warn{display:none;background:var(--brick);color:#fff;padding:8px 12px;border-radius:3px;font-size:13px;margin-top:8px;}

.ref-box{background:var(--ink);color:var(--paper);padding:22px 26px;border-radius:6px;text-align:center;margin:18px 0;}
.ref-box .code{font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:.06em;color:var(--gold);margin-top:6px;}

footer{border-top:1px solid var(--line);padding:28px 32px;font-size:12.5px;color:var(--muted);text-align:center;}
.footer-brand{font-family:'Source Serif 4',serif;font-weight:600;color:var(--ink);font-size:14px;margin-bottom:8px;}
.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:8px;}
.footer-links a, .footer-links button{color:var(--ink);text-decoration:none;font-size:12.5px;background:none;border:none;padding:0;cursor:pointer;}
.footer-links a:hover, .footer-links button:hover{text-decoration:underline;color:var(--teal);}
.footer-copyright{font-size:11.5px;color:var(--muted);}
.small{font-size:12.5px;color:var(--muted);}
.divider{height:1px;background:var(--line);margin:22px 0;}
</style>
</head>

    {id:'EN1', title:'Microgrids', text:"In the hills outside Italy, a cooperative of smallholder farmers recently financed a solar microgrid that now powers three villages after dark. The project took eighteen months longer than planned, mostly because the original battery supplier could not guarantee delivery through the rainy season. What made the difference, according to the project's engineer, was not the hardware but the willingness of residents to renegotiate tariffs twice as usage patterns shifted. Streetlights that once switched off at nine now stay lit until the last matatu passes. Shopkeepers report a modest but steady rise in evening trade. None of this was in the original feasibility study, which focused almost entirely on generation capacity rather than on how a community actually lives with power once it arrives."},

/* ===================== Storage helpers ===================== */

// Web App, paste its URL here to switch applicant/assessment/review data over

const CONFIG = {
  webAppUrl: 'https://script.google.com/macros/s/AKfycbzPmLLCGRwRgUw1DUExygxZcTr1UEmsTlDNLqEmBOCD-Vm42p3gRL9gCryb_kAdMtyd/exec',
  sharedSecret: 'Verbatim', // must match SHARED_SECRET in the Apps Script
  // Client-side gate only — visible to anyone who views this file's source.
  // It deters casual access, not a determined visitor. Change it periodically,

  adminPassphrase: 'meridian2026',
};

async function remoteCall(action, payload){
  if(!CONFIG.webAppUrl) return null;
  try{
    const res = await fetch(CONFIG.webAppUrl, {
      method:'POST',
      // text/plain avoids a CORS preflight against the Apps Script endpoint
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(Object.assign({action, secret:CONFIG.sharedSecret}, payload)),
    });
    const data = await res.json();
    if(!data.ok){ console.error('Backend error:', data.error); toast('Backend error, check the Apps Script deployment.', 'error'); return null; }
    return data.result;
  } catch(e){ console.error('Backend call failed', e); toast('Could not reach the Sheets backend, falling back may be needed.', 'error'); return null; }
}
const remoteGet = key => remoteCall('kv_get', {key});
const remoteSet = (key, value) => remoteCall('kv_set', {key, value});
const remoteList = async prefix => (await remoteCall('kv_list', {prefix})) || [];
const remoteUploadDoc = (applicantRef, docType, filename, base64, mimeType) =>
  remoteCall('upload_doc', {applicantRef, docType, filename, base64, mimeType});

async function sGet(key, shared=true){
  if(CONFIG.webAppUrl && shared) return await remoteGet(key);
  try{ const r = await window.storage.get(key, shared); return r? JSON.parse(r.value): null; }
  catch(e){ return null; }
}
async function sSet(key, value, shared=true){
  if(CONFIG.webAppUrl && shared){ await remoteSet(key, value); return true; }
  try{
    const r = await window.storage.set(key, JSON.stringify(value), shared);
    if(!r && key!==SESSION_KEY){ toast('Could not save, storage returned no result.', 'error'); }
    return r;
  }
  catch(e){
    console.error('storage set failed', e);
    if(key!==SESSION_KEY) toast('Could not save your data. Please try again.', 'error');
    return null;
  }
}
async function sList(prefix, shared=true){
  if(CONFIG.webAppUrl && shared) return await remoteList(prefix);
  try{ const r = await window.storage.list(prefix, shared); return r? r.keys : []; }
  catch(e){ return []; }
}

function uid(){ return Math.random().toString(36).slice(2,10); }

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('Could not read file'));
    r.readAsDataURL(file);
  });
}

const MAX_DOC_SIZE_BYTES = 8 * 1024 * 1024; // 8MB — Apps Script/Drive comfortably handles this; keeps uploads fast on mobile data too

async function handleDocFile(e, docType, nameField, idField){
  const f = e.target.files[0];
  if(!f) return;
  if(f.size > MAX_DOC_SIZE_BYTES){
    toast(f.name+' is too large (max 8MB). Please choose a smaller file.', 'error');
    e.target.value = '';
    return;
  }
  regForm[nameField] = f.name;
  scheduleSave();
  if(CONFIG.webAppUrl){
    toast('Uploading '+f.name+'…');
    try{
      const base64 = await fileToBase64(f);
      const result = await remoteUploadDoc(regForm.id, docType, f.name, base64, f.type);
      if(result && result.fileId){ regForm[idField]=result.fileId; toast(f.name+' uploaded', 'success'); }
      else toast('Upload failed for '+f.name+' — reselect the file to retry.', 'error');
    } catch(err){ toast('Upload failed for '+f.name+' — reselect the file to retry.', 'error'); }
    scheduleSave();
  }
}
function refCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return 'VS-'+s;
}
function wordCount(t){ return (t.trim().match(/\S+/g)||[]).length; }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Native alert()/confirm() are blocked inside this sandboxed preview, so use in-page equivalents instead. */
function toast(msg, type='info'){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = 'toast'+(type==='error'?' error':type==='success'?' success':'');
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
}
function confirmDialog(msg){
  return new Promise(resolve=>{
    const overlay=document.getElementById('modalHost');
    document.getElementById('modalMsg').textContent = msg;
    overlay.style.display='flex';
    const ok=document.getElementById('modalOk'), cancel=document.getElementById('modalCancel');
    const cleanup=(result)=>{ overlay.style.display='none'; ok.onclick=null; cancel.onclick=null; resolve(result); };
    ok.onclick=()=>cleanup(true);
    cancel.onclick=()=>cleanup(false);
  });
}

/* ===================== Session persistence (survives refresh) ===================== */
const SESSION_KEY = 'ml_session_v1';
let _saveTimer = null;
function scheduleSave(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(saveSession, 500); }

async function saveSession(){
  const box = document.getElementById('answerBox');
  const session = {
    view, regStep, regForm, regTracks,
    currentApplicantId: currentApplicant ? currentApplicant.id : null,
    activeAssessment: activeAssessment ? {
      from: activeAssessment.from, to: activeAssessment.to,
      passageId: activeAssessment.passage.id,
      startedAt: activeAssessment.startedAt,
      pasteAttempts: activeAssessment.pasteAttempts,
      tabSwitchCount: activeAssessment.tabSwitchCount||0,
      awaySeconds: activeAssessment.awaySeconds||0,
      answerText: box ? box.value : (window._draftAnswer || ''),
    } : null,
    adminUnlocked, adminReviewerName, adminTab, adminDetailId,
  };
  await sSet(SESSION_KEY, session, false);
}

async function loadSession(){
  const s = await sGet(SESSION_KEY, false);
  if(!s) return;
  view = s.view || 'home';
  regStep = s.regStep || 1;
  regForm = Object.assign(regForm, s.regForm || {});
  regTracks = s.regTracks || [];
  adminUnlocked = !!s.adminUnlocked;
  adminReviewerName = s.adminReviewerName || '';
  adminTab = s.adminTab || 'queue';
  adminDetailId = s.adminDetailId || null;

  if(s.currentApplicantId){
    currentApplicant = await sGet('applicants:'+s.currentApplicantId, true);
    if(!currentApplicant){ view = 'home'; } // record no longer exists — fall back safely
    else if(view==='register' && regStep==='done'){ view='apply-dash'; } // the one-time ref-code screen doesn't survive refresh; the dashboard does
  }
  if(s.activeAssessment && currentApplicant){
    const {from,to,passageId,startedAt,pasteAttempts,tabSwitchCount,awaySeconds,answerText} = s.activeAssessment;
    const passage = (PASSAGES[from]||[]).find(p=>p.id===passageId) || pickPassage(from);
    activeAssessment = {from,to,passage,startedAt,pasteAttempts:pasteAttempts||0,tabSwitchCount:tabSwitchCount||0,awaySeconds:awaySeconds||0};
    // A page reload while an assessment is in progress is itself a way to leave — log it as a switch.
    activeAssessment.tabSwitchCount++;
    window._draftAnswer = answerText || '';
  } else if(view==='assess' || view==='assess-warn'){
    view = 'apply-dash'; // can't resume an assessment (or its warning step) without in-memory track context
  }
}

/* ===================== Assessment integrity monitoring =====================
   Honest framing: a webpage cannot actually stop someone from switching tabs
   or opening another app — browsers don't give JS that power. What this does
   instead is detect and log when it happens, and make clear up front that
   it's being logged, which is the real deterrent. Treat these numbers as a
   signal for reviewers, not proof of anything on their own. */
let _awayStart = null;
function markAway(){
  if(!activeAssessment || view!=='assess') return;
  if(_awayStart) return; // already tracking this absence
  _awayStart = Date.now();
  activeAssessment.tabSwitchCount = (activeAssessment.tabSwitchCount||0) + 1;
  scheduleSave();
}
function markBack(){
  if(!activeAssessment || !_awayStart) return;
  activeAssessment.awaySeconds = (activeAssessment.awaySeconds||0) + Math.round((Date.now()-_awayStart)/1000);
  _awayStart = null;
  scheduleSave();
  const label = document.getElementById('integrityLabel');
  if(label) label.textContent = activeAssessment.tabSwitchCount+' tab switch(es) logged';
  toast('Tab switch detected and logged ('+activeAssessment.tabSwitchCount+' total this assessment).', 'error');
}
document.addEventListener('visibilitychange', ()=>{ document.hidden ? markAway() : markBack(); });
window.addEventListener('blur', markAway);
window.addEventListener('focus', markBack);

// Deterrent only — keyboard shortcuts can't be reliably blocked, but this stops the common paths.
window.addEventListener('keydown', (e)=>{
  if(view!=='assess') return;
  const k = e.key ? e.key.toLowerCase() : '';
  const blocked = e.key==='F12'
    || ((e.ctrlKey||e.metaKey) && e.shiftKey && ['i','j','c'].includes(k))
    || ((e.ctrlKey||e.metaKey) && (k==='u' || k==='s'));
  if(blocked){ e.preventDefault(); toast('Developer tools and save shortcuts are disabled during the assessment.', 'error'); }
});

// Native "leave site?" prompt if they try to close/navigate away mid-assessment.
window.addEventListener('beforeunload', (e)=>{
  if(view==='assess' && activeAssessment){ e.preventDefault(); e.returnValue=''; }
});

/* ===================== Pentagon diagram ===================== */
function pentagonPositions(){
  const cx=140, cy=140, r=105;
  const pos={};
  LANGS.forEach((l,i)=>{
    const ang = -Math.PI/2 + i*(2*Math.PI/5);
    pos[l.code] = { x: cx + r*Math.cos(ang), y: cy + r*Math.sin(ang) };
  });
  return pos;
}
function renderPentagonSVG(tracks, opts={}){
  const pos = pentagonPositions();
  const selA = opts.selA, selB = opts.selB;
  let arrows = tracks.map(t=>{
    const a=pos[t.from], b=pos[t.to];
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy);
    const ux=dx/len, uy=dy/len;
    const nx=-uy, ny=ux;
    const mx=(a.x+b.x)/2 + nx*18, my=(a.y+b.y)/2 + ny*18;
    const startX=a.x+ux*22, startY=a.y+uy*22;
    const endX=b.x-ux*26, endY=b.y-uy*26;
    return `<path d="M ${startX} ${startY} Q ${mx} ${my} ${endX} ${endY}" fill="none" stroke="#a9843c" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.9"/>`;
  }).join('');
  let nodes = LANGS.map(l=>{
    const p=pos[l.code];
    const isSel = l.code===selA || l.code===selB;
    return `<g data-lang="${l.code}" class="lang-node" style="cursor:pointer">
      <circle cx="${p.x}" cy="${p.y}" r="26" fill="${isSel?'#2f6b67':'#fff'}" stroke="#1c2430" stroke-width="1.6"/>
      <text x="${p.x}" y="${p.y+5}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="${isSel?'#fff':'#1c2430'}" font-weight="600">${l.code}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 280 280" width="280" height="280">
    <defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a9843c"/></marker></defs>
    ${arrows}${nodes}
  </svg>`;
}

function wireRegisterEvents(){
  if(regStep===1){
    const bindText = (id, field) => {
      const el = document.getElementById(id);
      el.addEventListener('input', ()=>{ regForm[field]=el.value; scheduleSave(); });
    };
    bindText('f_first','firstName'); bindText('f_mid','middleName'); bindText('f_last','lastName');
    bindText('f_idnum','idNumber'); bindText('f_phone','phone');

    const countrySel = document.getElementById('f_country');
    const phoneInput = document.getElementById('f_phone');
    const phoneHint = document.getElementById('phoneHint');
    countrySel.addEventListener('change', ()=>{
      regForm.country = countrySel.value;
      const code = dialCodeFor(regForm.country);
      phoneInput.placeholder = `${code} XXX XXX XXX`;
      phoneHint.textContent = `Format follows ${regForm.country}: expected to start with ${code}.`;
      // If the phone field is empty, or still holds a different country's dial code, prefill the right one.
      const trimmed = phoneInput.value.trim();
      const looksLikeOtherCode = trimmed && !trimmed.startsWith(code) && COUNTRIES.some(c=>trimmed.startsWith(c.code) && c.code!=='+');
      if(!trimmed || looksLikeOtherCode){ phoneInput.value = code+' '; regForm.phone = phoneInput.value; }
      scheduleSave();
    });
    document.getElementById('f_idtype').addEventListener('change', (e)=>{ regForm.idType=e.target.value; scheduleSave(); });
    document.getElementById('f_idfront').addEventListener('change', (e)=>handleDocFile(e, 'id_front', 'idFrontName', 'idFrontFileId'));
    document.getElementById('f_idback').addEventListener('change', (e)=>handleDocFile(e, 'id_back', 'idBackName', 'idBackFileId'));
    document.getElementById('f_poa').addEventListener('change', (e)=>handleDocFile(e, 'proof_of_residence', 'poaName', 'poaFileId'));

    document.getElementById('toStep2').onclick = async ()=>{
      regForm.firstName=document.getElementById('f_first').value.trim();
      regForm.middleName=document.getElementById('f_mid').value.trim();
      regForm.lastName=document.getElementById('f_last').value.trim();
      regForm.country=document.getElementById('f_country').value;
      regForm.idType=document.getElementById('f_idtype').value;
      regForm.idNumber=document.getElementById('f_idnum').value.trim();
      regForm.phone=document.getElementById('f_phone').value.trim();
      const idf=document.getElementById('f_idfront').files[0];
      const idb=document.getElementById('f_idback').files[0];
      const poa=document.getElementById('f_poa').files[0];
      if(idf) regForm.idFrontName=idf.name;
      if(idb) regForm.idBackName=idb.name;
      if(poa) regForm.poaName=poa.name;
      if(!regForm.firstName||!regForm.lastName||!regForm.idNumber||!regForm.phone||!regForm.idFrontName||!regForm.idBackName||!regForm.poaName){
        toast('Please complete all required fields, including the three documents, before continuing.', 'error'); return;
      }
      regStep=2; render();
    };
  }
  if(regStep===2){
    document.querySelectorAll('.lang-node').forEach(n=>{
      n.onclick=()=>{
        const code=n.dataset.lang;
        if(!window._pendingA){ window._pendingA=code; render(); return; }
        if(window._pendingA===code){ window._pendingA=null; render(); return; }
        const a=window._pendingA, b=code;
        const reverseExists = regTracks.some(t=>t.from===b && t.to===a);
        const dup = regTracks.some(t=>t.from===a && t.to===b);
        if(reverseExists){ toast(`${langName(b)} → ${langName(a)} is already selected, so ${langName(a)} → ${langName(b)} (its reverse) can't be added.`, 'error'); }
        else if(dup){ toast('That track is already selected.', 'error'); }
        else{ regTracks.push({from:a,to:b}); }
        window._pendingA=null; render();
      };
    });
    document.querySelectorAll('.rmTrack').forEach(b=>b.onclick=()=>{ regTracks.splice(+b.dataset.i,1); render(); });
    document.getElementById('toStep1b').onclick=()=>{ regStep=1; render(); };
    const s3btn=document.getElementById('toStep3');
    if(s3btn) s3btn.onclick=()=>{ if(regTracks.length){ regStep=3; render(); } };
  }
  if(regStep===3){
    document.getElementById('toStep2b').onclick=()=>{ regStep=2; render(); };
    document.getElementById('consentBox').onchange=(e)=>{ regForm.consent=e.target.checked; };
    document.getElementById('submitReg').onclick=async ()=>{
      if(!regForm.consent){ toast('Please confirm the consent checkbox to submit.', 'error'); return; }
      const id = regForm.id || refCode();
      const record = {
        id, ...regForm,
        tracks: regTracks,
        createdAt: new Date().toISOString(),
        verificationStatus: 'submitted',
        verificationUpdatedAt: null,
        claimedBy: null,
      };
      await sSet('applicants:'+id, record, true);
      currentApplicant = record;
      regForm = { id:null, firstName:'', middleName:'', lastName:'', idType:'National ID', idNumber:'', country:'', phone:'', idFrontName:'', idBackName:'', poaName:'', idFrontFileId:null, idBackFileId:null, poaFileId:null, consent:false };
      regTracks = [];
      view='register'; regStep='done'; window._lastRegId=id;
      render();
    };
  }
}

function renderRegister(){
  if(regStep==='done') return renderRegisterDone(window._lastRegId);
  if(regStep===1) return renderRegisterStep1();
  if(regStep===2) return renderRegisterStep2();
  if(regStep===3) return renderRegisterStep3();
}

/* ===================== APPLY / ASSESSMENT ===================== */
function renderApplyLookup(){
  return `
  <h2>Continue your application</h2>
  <p class="small">Enter your reference code and the phone number you registered with.</p>
  <div class="grid2">
    <div><label>Reference code</label><input id="lk_ref" type="text" placeholder="VS-XXXXXX"></div>
    <div><label>Phone number</label><input id="lk_phone" type="tel"></div>
  </div>
  <div style="margin-top:16px;"><button class="btn" id="lookupBtn">Continue →</button></div>
  <div id="lookupErr"></div>
  `;
}

async function doLookup(){
  const ref=document.getElementById('lk_ref').value.trim().toUpperCase();
  const phone=document.getElementById('lk_phone').value.trim();
  const rec = await sGet('applicants:'+ref, true);
  const errEl=document.getElementById('lookupErr');
  if(!rec || rec.phone.replace(/\s+/g,'') !== phone.replace(/\s+/g,'')){
    errEl.innerHTML = '<div class="notice brick">No matching application found. Check your reference code and phone number.</div>';
    return;
  }
  currentApplicant = rec;
  view='apply-dash';
  render();
}

async function renderApplyDash(){
  const rec = currentApplicant;
  const subs = {};
  for(const t of rec.tracks){
    const key = 'assessment:'+rec.id+':'+t.from+'-'+t.to;
    subs[t.from+'-'+t.to] = await sGet(key, true);
  }
  window._applyTrackSubs = subs;
  const rows = rec.tracks.map(t=>{
    const s = subs[t.from+'-'+t.to];
    const status = s? (s.score!=null?'scored':'submitted') : 'pending';
    const label = s? (s.score!=null?`Scored (${s.score}/10)`:'Submitted — awaiting review') : 'Not started';
    return `<tr>
      <td>${langName(t.from)} → ${langName(t.to)}</td>
      <td><span class="badge ${status}">${label}</span></td>
      <td>${s? '' : `<button class="btn secondary startAssess" data-from="${t.from}" data-to="${t.to}">Take assessment</button>`}</td>
    </tr>`;
  }).join('');
  return `
  <h2>Welcome back, ${esc(rec.firstName)}</h2>
  <p class="small">Reference ${rec.id}. Complete one assessment per track below. Each track can only be attempted once.</p>
  <table><tr><th>Track</th><th>Status</th><th></th></tr>${rows}</table>
  `;
}

function pickPassage(fromLang){
  const list = PASSAGES[fromLang] || PASSAGES.EN;
  return list[Math.floor(Math.random()*list.length)];
}

function renderAssessWarn(){
  const t = pendingTrack;
  return `
  <h2>Before you begin — ${langName(t.from)} → ${langName(t.to)}</h2>
  <div class="notice brick">
    <strong>This assessment is monitored, and reviewers see the results:</strong>
    <ul style="margin:8px 0 0;padding-left:20px;">
      <li>Pasting text into your answer is disabled, attempts are counted and shown to reviewers.</li>
      <li>Switching tabs, switching apps, or leaving this page is detected and timed, the count and time away are shown to reviewers.</li>
      <li>The source text can't be copied, and right-click is disabled on it.</li>
    </ul>
  </div>
  <p class="small">None of this is meant to catch you out, it's there so reviewers can trust that the translation in front of them is genuinely yours, done on your own knowledge. Once you start, you won't be able to pause the clock, so make sure you're ready before continuing.</p>
  <div style="margin-top:20px;display:flex;justify-content:space-between;">
    <button class="btn secondary" id="cancelAssess">← Not yet, take me back</button>
    <button class="btn gold" id="beginAssess">I understand — begin assessment</button>
  </div>
  `;
}

function renderAssessment(){
  const a = activeAssessment;
  const wc = wordCount(document.getElementById && document.getElementById('answerBox') ? document.getElementById('answerBox').value : '');
  return `
  <h2>Assessment — ${langName(a.from)} → ${langName(a.to)}</h2>
  <div class="notice teal">Translate the passage below into ${langName(a.to)}. As explained before you started: pasting and tab switches are logged and visible to reviewers. Take the time you need to get it right, this is scored on quality, not speed.</div>
  <label>Source text (${langName(a.from)})</label>
  <div class="passage-box" oncopy="return false" oncontextmenu="return false">${esc(a.passage.text)}</div>
  <label>Your translation (${langName(a.to)})</label>
  <textarea id="answerBox" class="answer" maxlength="6000" placeholder="Type your translation here…"></textarea>
  <div class="paste-warn" id="pasteWarn">Pasting is disabled for this assessment. This attempt has been logged.</div>
  <div class="meta-row"><span id="wcLabel">0 words</span><span>Started ${new Date(a.startedAt).toLocaleTimeString()}</span><span id="integrityLabel">${a.tabSwitchCount? a.tabSwitchCount+' tab switch(es) logged' : 'No tab switches logged'}</span></div>
  <div style="margin-top:20px;display:flex;justify-content:space-between;">
    <button class="btn secondary" onclick="activeAssessment=null; view='apply-dash'; render();">← Back without submitting</button>
    <button class="btn gold" id="submitAssess">Submit translation</button>
  </div>
  `;
}

function wireAssessmentEvents(){
  const box = document.getElementById('answerBox');
  const wcLabel = document.getElementById('wcLabel');
  const warn = document.getElementById('pasteWarn');
  box.addEventListener('input', ()=>{ wcLabel.textContent = wordCount(box.value)+' words'; scheduleSave(); });
  box.addEventListener('paste', (e)=>{ e.preventDefault(); activeAssessment.pasteAttempts++; warn.style.display='block'; setTimeout(()=>warn.style.display='none', 2500); });
  box.addEventListener('drop', (e)=>{ e.preventDefault(); activeAssessment.pasteAttempts++; warn.style.display='block'; setTimeout(()=>warn.style.display='none', 2500); });
  document.getElementById('submitAssess').onclick = async ()=>{
    const text = box.value.trim();
    if(wordCount(text) < 20){ toast('Your translation looks very short, please review before submitting.', 'error'); return; }
    const proceed = await confirmDialog('Submit this translation? You will not be able to edit it afterward.');
    if(!proceed) return;
    const a = activeAssessment;
    const key = 'assessment:'+currentApplicant.id+':'+a.from+'-'+a.to;
    const record = {
      applicantId: currentApplicant.id,
      applicantName: [currentApplicant.firstName,currentApplicant.lastName].join(' '),
      from:a.from, to:a.to,
      passageId:a.passage.id, passageTitle:a.passage.title, sourceText:a.passage.text,
      translation:text,
      wordCount: wordCount(text),
      timeSpentSec: Math.round((Date.now()-a.startedAt)/1000),
      pasteAttempts: a.pasteAttempts,
      tabSwitchCount: a.tabSwitchCount||0,
      awaySeconds: a.awaySeconds||0,
      submittedAt: new Date().toISOString(),
      score: null, notes: ''
    };
    await sSet(key, record, true);
    activeAssessment=null; view='apply-dash'; render();
  };
}

async function loadApplicants(){
  const appKeys = await sList('applicants:', true);
  const applicants = [];
  for(const k of appKeys){ const r = await sGet(k, true); if(r) applicants.push(r); }
  return applicants;
}
async function loadAssessments(){
  const asKeys = await sList('assessment:', true);
  const assessments = [];
  for(const k of asKeys){ const r = await sGet(k, true); if(r) assessments.push({key:k, ...r}); }
  return assessments;
}
async function bestScore(applicantId, assessments){
  const mine = assessments.filter(a=>a.applicantId===applicantId && a.score!=null);
  if(!mine.length) return null;
  return Math.max(...mine.map(a=>a.score));
}
async function loadReviews(applicantId){
  const keys = await sList('review:'+applicantId+':', true);
  const reviews = [];
  for(const k of keys){ const r = await sGet(k, true); if(r) reviews.push(r); }
  reviews.sort((a,b)=> new Date(b.at) - new Date(a.at));
  return reviews;
}

function statusLabel(s){
  return {submitted:'Not yet reviewed', under_review:'Under review', verified:'Verified',
    needs_resubmission:'Needs resubmission', rejected:'Rejected'}[s] || s;
}

async function renderAdminQueue(){
  const applicants = (await loadApplicants()).filter(a=> (a.verificationStatus||'submitted')!=='verified' && a.verificationStatus!=='rejected');
  const assessments = await loadAssessments();
  const withScores = await Promise.all(applicants.map(async a=>({a, score: await bestScore(a.id, assessments)})));
  withScores.sort((x,y)=> (y.score??-1) - (x.score??-1));
  const rows = withScores.map(({a,score})=>{
    const status = a.verificationStatus||'submitted';
    const canClaim = status==='submitted';
    const isMine = status==='under_review' && a.claimedBy===adminReviewerName;
    const lockedByOther = status==='under_review' && a.claimedBy!==adminReviewerName;
    return `<tr>
      <td class="mono">${esc(a.id)}</td>
      <td>${esc([a.firstName,a.lastName].filter(Boolean).join(' '))}</td>
      <td>${score!=null? `<strong>${score}/10</strong>` : '<span class="small">Not scored yet</span>'}</td>
      <td><span class="badge ${status}">${statusLabel(status)}</span>${lockedByOther?` <span class="small">(claimed by ${esc(a.claimedBy)})</span>`:''}</td>
      <td>
        ${canClaim? `<button class="btn secondary claimBtn" data-id="${a.id}">Claim &amp; review</button>` : ''}
        ${isMine? `<button class="btn secondary openReviewBtn" data-id="${a.id}">Continue review</button>` : ''}
      </td>
    </tr>`;
  }).join('');
  return `
  <p class="small">Sorted by best assessment score, so reviewer time goes to applicants worth verifying first. Only ${'"submitted"'} and ${'"under review"'} applications appear here.</p>
  <table><tr><th>Ref</th><th>Name</th><th>Best score</th><th>Status</th><th></th></tr>${rows||'<tr><td colspan=5 class="small">Queue is empty.</td></tr>'}</table>
  `;
}

function wireAdminScoreEvents(){
  document.querySelectorAll('.scoreInput').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const key=inp.dataset.key;
      const rec = await sGet(key, true);
      if(!rec) return;
      const v = inp.value.trim();
      rec.score = v===''? null : Math.max(0,Math.min(10, Number(v)));
      await sSet(key, rec, true);
      render();
    });
  });
}

async function claimApplication(id){
  const a = await sGet('applicants:'+id, true);
  if(!a || (a.verificationStatus||'submitted')!=='submitted'){ render(); return; }
  a.verificationStatus='under_review'; a.claimedBy=adminReviewerName; a.verificationUpdatedAt=new Date().toISOString();
  await sSet('applicants:'+id, a, true);
  await sSet('review:'+id+':'+Date.now(), {reviewer:adminReviewerName, decision:'claimed', reason:'', at:new Date().toISOString()}, true);
  adminDetailId = id; reviewDraft = {};
  render();
}

async function submitDecision(id, decision){
  const reasonEl = document.getElementById('reviewReason');
  const reason = reasonEl? reasonEl.value.trim() : '';
  if(decision!=='verified' && !reason){ toast('Please add a reason before recording this decision.', 'error'); return; }
  const checklist = {};
  document.querySelectorAll('.chkItem').forEach(c=>{ checklist[c.dataset.id]=c.checked; });
  const a = await sGet('applicants:'+id, true);
  if(!a) return;
  a.verificationStatus = decision;
  a.verificationUpdatedAt = new Date().toISOString();
  a.claimedBy = null;
  await sSet('applicants:'+id, a, true);
  await sSet('review:'+id+':'+Date.now(), {reviewer:adminReviewerName, decision, reason, checklist, at:new Date().toISOString()}, true);
  reviewDraft = {};
  render();
}

function wireAdminEvents(){
  document.querySelectorAll('.claimBtn').forEach(b=> b.onclick=()=> claimApplication(b.dataset.id));
  document.querySelectorAll('.openReviewBtn').forEach(b=> b.onclick=()=>{ adminDetailId=b.dataset.id; reviewDraft={}; render(); });
  document.querySelectorAll('.chkItem').forEach(c=> c.onchange=()=>{ reviewDraft[c.dataset.id]=c.checked; });
  const vBtn=document.getElementById('decideVerified'); if(vBtn) vBtn.onclick=()=>submitDecision(adminDetailId,'verified');
  const rBtn=document.getElementById('decideResubmit'); if(rBtn) rBtn.onclick=()=>submitDecision(adminDetailId,'needs_resubmission');
  const xBtn=document.getElementById('decideRejected'); if(xBtn) xBtn.onclick=()=>submitDecision(adminDetailId,'rejected');
  wireAdminScoreEvents();
}

/* ===================== Render dispatcher ===================== */
async function render(){
  renderNav();
  const app = document.getElementById('app');
  if(view==='home'){ app.innerHTML = renderHome(); }
  else if(view==='register'){
    if(regStep!=='done' && !regForm.id) regForm.id = refCode();
    app.innerHTML = renderRegister(); wireRegisterEvents();
  }
  else if(view==='apply'){
    app.innerHTML = renderApplyLookup();
    document.getElementById('lookupBtn').onclick = doLookup;
  }
  else if(view==='apply-dash'){
    app.innerHTML = '<p class="small">Loading…</p>';
    app.innerHTML = await renderApplyDash();
    document.querySelectorAll('.startAssess').forEach(b=>{
      b.onclick=()=>{
        pendingTrack = { from:b.dataset.from, to:b.dataset.to };
        view='assess-warn'; render();
      };
    });
  }
  else if(view==='assess-warn'){
    app.innerHTML = renderAssessWarn();
    document.getElementById('beginAssess').onclick = ()=>{
      const {from,to} = pendingTrack;
      activeAssessment = { from, to, passage: pickPassage(from), startedAt: Date.now(), pasteAttempts:0, tabSwitchCount:0, awaySeconds:0 };
      pendingTrack = null;
      view='assess'; render();
    };
    document.getElementById('cancelAssess').onclick = ()=>{ pendingTrack=null; view='apply-dash'; render(); };
  }
  else if(view==='assess'){
    app.innerHTML = renderAssessment();
    wireAssessmentEvents();
    if(window._draftAnswer){
      const box = document.getElementById('answerBox');
      if(box){ box.value = window._draftAnswer; box.dispatchEvent(new Event('input')); }
      window._draftAnswer = null;
    }
  }
  else if(view==='admin'){
    if(!adminUnlocked){
      app.innerHTML = renderAdminGate();
      document.getElementById('admGo').onclick=()=>{
        const name = document.getElementById('admName').value.trim();
        if(!name){ toast('Enter your reviewer name.', 'error'); return; }
        if(document.getElementById('admPass').value === CONFIG.adminPassphrase){ adminUnlocked=true; adminReviewerName=name; render(); }
        else toast('Incorrect passphrase.', 'error');
      };
    } else if(adminDetailId){
      app.innerHTML = '<p class="small">Loading…</p>';
      app.innerHTML = await renderAdminDetail(adminDetailId);
      wireAdminEvents();
    } else {
      app.innerHTML = `<h2>Admin review</h2><p class="small">Signed in as ${esc(adminReviewerName)}.</p>
        <div class="tabbar">
          <button class="${adminTab==='queue'?'active':''}" data-t="queue">Review queue</button>
          <button class="${adminTab==='applicants'?'active':''}" data-t="applicants">All applicants</button>
          <button class="${adminTab==='scored'?'active':''}" data-t="scored">Scored submissions</button>
        </div>
        <div id="adminTabBody"><p class="small">Loading…</p></div>`;
      document.querySelectorAll('.tabbar button').forEach(b=> b.onclick=()=>{ adminTab=b.dataset.t; render(); });
      const body = adminTab==='queue'? await renderAdminQueue() : adminTab==='applicants'? await renderAdminApplicants() : await renderAdminScored();
      document.getElementById('adminTabBody').innerHTML = body;
      wireAdminEvents();
    }
  }
  saveSession();
}

async function startApp(){
  await loadSession();
  await render();
  checkAdminHash();
  if(!CONFIG.webAppUrl && (typeof window.storage === 'undefined')){
    toast('No storage backend detected, data will not be saved. Configure the Sheets backend in CONFIG, or open this inside Claude.', 'error');
  }
}
startApp();
</script>
</body>
</html>
